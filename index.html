<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Pokémon Gallery Viewer — Search and explore Pokémon with names, types, images, and Pokédex descriptions in a beautiful gallery view."/>
  <title>Pokémon Gallery Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #f0f4ff;
      /* Subtle dot grid pattern — keeps it clean but not flat */
      background-image: radial-gradient(circle, #c9d4f5 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    body.visible {
      opacity: 1;
    }

    /* ── Pokéball Loader ── */
    #pokeball-loader {
      position: fixed;
      inset: 0;
      background: #f0f4ff;
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #pokeball-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .pokeball {
      width: 64px;
      height: 64px;
      background: linear-gradient(to bottom, #e63946 50%, #f8f9ff 50%);
      border: 4px solid #1a1a2e;
      border-radius: 50%;
      position: relative;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 4px 16px rgba(230, 57, 70, 0.25);
    }

    /* Horizontal divider line */
    .pokeball::after {
      content: "";
      position: absolute;
      top: 50%;
      left: -4px;
      right: -4px;
      height: 4px;
      background: #1a1a2e;
      transform: translateY(-50%);
    }

    /* Center button */
    .pokeball::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      border: 3px solid #1a1a2e;
      background: #f8f9ff;
      border-radius: 50%;
      z-index: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.65em;
      color: #555;
      letter-spacing: 0.05em;
    }

    /* ── Main Content ── */
    .content {
      max-width: 540px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.55em;
      color: #457b9d;
      background: #dce9f5;
      border: 1.5px solid #a8c8e0;
      border-radius: 20px;
      padding: 5px 14px;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    h1 {
      color: #1a1a2e;
      font-size: clamp(1.8em, 5vw, 2.6em);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 14px;
    }

    h1 span {
      color: #e63946;
    }

    p.subtitle {
      color: #555;
      font-size: 1.05em;
      font-weight: 600;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background-color: #e63946;
      color: #fff;
      padding: 14px 30px;
      font-size: 1em;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 14px rgba(230, 57, 70, 0.35);
    }

    .btn:hover {
      background-color: #c1121f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(230, 57, 70, 0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Tiny pokeball icon inside button */
    .btn-icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(to bottom, #fff 50%, #ffcdd0 50%);
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(to right, #e63946, #457b9d);
      border-radius: 2px;
      margin: 36px auto 28px;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-number {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9em;
      color: #e63946;
    }

    .stat-label {
      font-size: 0.78em;
      color: #777;
      font-weight: 600;
    }

    /* ── Footer ── */
    footer {
      margin-top: 20px;
      font-size: 0.82em;
      color: #999;
      font-weight: 600;
    }

    footer .heart {
      color: #e63946;
    }
  </style>
</head>
<body>

  <!-- Pokéball Loader -->
  <div id="pokeball-loader">
    <div class="pokeball"></div>
    <p class="loading-text">Loading Pokédex…</p>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="badge">✦ Pokédex Web App</div>

    <h1>Pokémon <span>Gallery</span> Viewer</h1>

    <p class="subtitle">
      Search any Pokémon by name and explore its type,<br>
      artwork, and Pokédex description in one place.
    </p>

    <a class="btn" href="https://pokemon-gallery-web.streamlit.app/" target="_blank" rel="noopener noreferrer">
      <span class="btn-icon"></span>
      Launch App
    </a>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <span class="stat-number">1000+</span>
        <span class="stat-label">Pokémon</span>
      </div>
      <div class="stat">
        <span class="stat-number">18</span>
        <span class="stat-label">Types</span>
      </div>
      <div class="stat">
        <span class="stat-number">9</span>
        <span class="stat-label">Generations</span>
      </div>
    </div>

    <footer>
      Made with <span class="heart">♥</span> by Dhawal Lamba (aka Myth)
    </footer>
  </div>

  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('pokeball-loader');
      loader.classList.add('hidden');
      // Fade in body content after loader fades out
      setTimeout(() => {
        loader.style.display = 'none';
        document.body.classList.add('visible');
      }, 450);
    });
  </script>
</body>
</html>
